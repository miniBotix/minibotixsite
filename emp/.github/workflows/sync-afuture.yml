name: Sync AFuture

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout MinibotixSite
        uses: actions/checkout@v4

      - name: Clone AFuture
        run: |
          git clone https://github.com/minibotix/AFuture.git temp
          mkdir -p explore
          cp -r temp/* explore/

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Sync AFuture" || echo "No changes"
          git push