<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MiniBotix · Print ID Cards</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
/* ── SCREEN STYLES ── */
body{font-family:'DM Sans',sans-serif;background:#0a0f1a;color:#daeeff;margin:0;padding:0}
.screen-header{background:#060d1a;border-bottom:1px solid rgba(0,180,255,0.12);
  padding:18px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.sh-brand{display:flex;align-items:center;gap:10px}
.sh-logo{width:32px;height:32px;border-radius:8px;overflow:hidden;
  background:linear-gradient(135deg,#003fa0,#00aaff);
  display:flex;align-items:center;justify-content:center}
.sh-logo img{width:100%;height:100%;object-fit:cover}
.sh-title{font-family:'Syne',sans-serif;font-weight:700;font-size:16px}
.sh-title em{color:#00aaff;font-style:normal}
.sh-actions{display:flex;gap:8px}
.btn-print-all{background:linear-gradient(135deg,#003fa0,#00aaff);border:none;
  padding:10px 22px;border-radius:8px;color:#fff;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 16px rgba(0,100,255,0.3);transition:opacity .2s}
.btn-print-all:hover{opacity:.85}
.btn-back{background:transparent;border:1px solid rgba(0,180,255,0.2);
  padding:10px 18px;border-radius:8px;color:#6b8fa8;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-back:hover{border-color:#00aaff;color:#00aaff}
.screen-info{padding:12px 32px;font-family:'DM Mono',monospace;font-size:10px;color:#5a80a0;
  border-bottom:1px solid rgba(0,180,255,0.07)}
.cards-screen{padding:32px;display:flex;flex-wrap:wrap;gap:32px;justify-content:center}

/* ── PHYSICAL CARD — FRONT ── */
/* Standard CR80 card ratio: 85.6mm × 54mm ≈ 3.37in × 2.12in */
/* At 96dpi screen: ~323px × 204px. We scale up 1.7× for readability */
.card-set{display:flex;flex-direction:column;gap:12px;align-items:center}
.card-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:#3a5a72}
.btn-print-one{background:transparent;border:1px solid rgba(0,180,255,0.15);
  padding:6px 14px;border-radius:6px;color:#5a80a0;font-family:'DM Sans',sans-serif;
  font-size:10px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-print-one:hover{border-color:#00aaff;color:#00aaff}

.id-physical{
  width:340px;height:215px;
  border-radius:12px;overflow:hidden;
  box-shadow:0 12px 48px rgba(0,0,0,.8),0 0 0 1px rgba(0,180,255,0.15);
  position:relative;flex-shrink:0;
  /* Card layout: left = info, right = photo+QR */
  display:flex;flex-direction:column;
  background:#06101f;
  font-family:'DM Sans',sans-serif;
}

/* TOP STRIPE */
.phys-stripe{
  height:36px;flex-shrink:0;position:relative;overflow:hidden;
  background:linear-gradient(90deg,#001a50 0%,#0040aa 50%,#0099ee 100%);
  display:flex;align-items:center;justify-content:space-between;padding:0 12px;
}
.phys-stripe::after{content:'';position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.07) 1px,transparent 1px);
  background-size:12px 12px}
.ps-org{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff;
  letter-spacing:-.01em;position:relative;z-index:1}
.ps-sub{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.18em;
  text-transform:uppercase;color:rgba(255,255,255,0.55);position:relative;z-index:1}
.ps-id{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,.9);padding:3px 7px;border-radius:4px;
  position:relative;z-index:1}

/* CARD BODY */
.phys-body{flex:1;display:flex;gap:0;overflow:hidden}

/* LEFT — details */
.phys-left{flex:1;padding:10px 12px;display:flex;flex-direction:column;gap:6px;overflow:hidden}
.pl-photo{width:46px;height:46px;border-radius:50%;overflow:hidden;
  border:2px solid #00aaff;background:#0a1628;flex-shrink:0;
  box-shadow:0 0 0 2px rgba(0,170,255,0.1)}
.pl-photo img{width:100%;height:100%;object-fit:cover}
.pl-photo .pini{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#00aaff;background:#0a1628}
.pl-name-row{display:flex;align-items:center;gap:8px}
.pl-name{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;line-height:1.1;
  color:#d8eeff;letter-spacing:-.01em}
.pl-role{font-size:8.5px;font-weight:600;color:#00aaff;margin-top:1px}
.pl-dept{font-family:'DM Mono',monospace;font-size:6.5px;letter-spacing:.1em;
  text-transform:uppercase;color:#3a5a72;margin-top:1px}

.pl-meta{display:flex;gap:8px;margin-top:4px}
.pm-item{display:flex;flex-direction:column;gap:1px}
.pm-lbl{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.14em;
  text-transform:uppercase;color:#2a4a62}
.pm-val{font-size:9px;font-weight:600;color:#d8eeff}
.pm-val.blood{color:#ff3a5c;font-weight:800;font-size:11px}
.pm-val.since{font-family:'DM Mono',monospace;font-size:9px}

.pl-addr{font-size:7px;color:#3a5a72;line-height:1.5;margin-top:2px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* RIGHT — QR + since */
.phys-right{width:105px;flex-shrink:0;padding:10px 10px 10px 6px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  border-left:1px solid rgba(0,180,255,0.08)}
.pr-qr{background:#fff;padding:5px;border-radius:6px;
  display:flex;align-items:center;justify-content:center}
.pr-qr canvas,.pr-qr img{display:block}
.pr-scan-txt{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.1em;
  text-transform:uppercase;color:#2a4a62;text-align:center;line-height:1.4}
.pr-url{font-family:'DM Mono',monospace;font-size:5.5px;color:#1a3a5a;
  text-align:center;word-break:break-all;line-height:1.4}

/* BOTTOM STRIP */
.phys-bottom{height:20px;flex-shrink:0;border-top:1px solid rgba(0,180,255,0.07);
  background:rgba(0,0,0,0.2);display:flex;align-items:center;
  justify-content:space-between;padding:0 12px}
.pb-left{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.12em;
  text-transform:uppercase;color:#1a3a5a}
.pb-dot{width:6px;height:6px;border-radius:50%;background:#00ffa3;
  box-shadow:0 0 5px #00ffa3;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.pb-right{font-family:'DM Mono',monospace;font-size:6px;letter-spacing:.1em;
  text-transform:uppercase;color:#1a3a5a}

/* ── PRINT STYLES ── */
@media print{
  body{background:#fff;margin:0;padding:0}
  .screen-header,.screen-info,.card-label,.btn-print-one,.btn-print-all,.btn-back{display:none!important}
  .cards-screen{padding:6mm;gap:6mm;background:#fff}
  .card-set{break-inside:avoid}

  .id-physical{
    width:85.6mm;height:54mm;border-radius:3mm;
    box-shadow:none;border:0.3mm solid #ccc;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
  }
  .phys-stripe{-webkit-print-color-adjust:exact;print-color-adjust:exact;height:10mm}
  .ps-org{font-size:4mm}.ps-sub{font-size:2mm}.ps-id{font-size:2.5mm}
  .pl-photo{width:14mm;height:14mm}
  .pl-name{font-size:3.5mm}.pl-role{font-size:2.5mm}.pl-dept{font-size:2mm}
  .pm-lbl{font-size:1.8mm}.pm-val{font-size:2.5mm}.pm-val.blood{font-size:3mm}
  .pl-addr{font-size:2mm}
  .phys-right{width:28mm}
  .pr-qr{padding:1.5mm}
  .pr-scan-txt{font-size:1.8mm}.pr-url{font-size:1.5mm}
  .pb-left,.pb-right{font-size:1.8mm}
  .phys-bottom{height:6mm}
}
</style>
</head>
<body>

<!-- SCREEN HEADER -->
<div class="screen-header">
  <div class="sh-brand">
    <div class="sh-logo">
      <img src="logo.svg" alt="M" onerror="this.innerHTML='<span style=font-family:Syne,sans-serif;font-weight:800;font-size:13px;color:#fff>M</span>'">
    </div>
    <div class="sh-title">Mini<em>Botix</em> · ID Card Generator</div>
  </div>
  <div class="sh-actions">
    <button class="btn-back" onclick="location.href='employees.html'">← Directory</button>
    <button class="btn-print-all" onclick="window.print()">🖨 Print All Cards</button>
  </div>
</div>
<div class="screen-info" id="screenInfo">Loading employee data…</div>

<!-- CARDS -->
<div class="cards-screen" id="cardsWrap">
  <div style="padding:60px;text-align:center;color:#3a5a72;font-size:13px">
    <div style="font-size:32px;margin-bottom:12px">⏳</div>
    Loading cards…
  </div>
</div>

<script>
const BASE_URL = 'https://minibotix.online/';  /* ← Change to your domain */

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ini(n){return(n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()}
function empUrl(id){
  /* converts MBX-001 → MBX001, so URL = minibotix.online/MBX001 */
  return BASE_URL + id.replace('-','');
}

function buildCard(emp, idx){
  const url = empUrl(emp.id);
  const cardId = 'qr-'+emp.id.replace(/[^a-zA-Z0-9]/g,'');

  return`
  <div class="card-set">
    <div class="card-label">${esc(emp.id)} · ${esc(emp.name)}</div>
    <div class="id-physical">

      <!-- TOP STRIPE -->
      <div class="phys-stripe">
        <div>
          <div class="ps-org">MiniBotix</div>
          <div class="ps-sub">Employee Identity</div>
        </div>
        <div class="ps-id">${esc(emp.id)}</div>
      </div>

      <!-- BODY -->
      <div class="phys-body">
        <div class="phys-left">
          <!-- Photo + name -->
          <div class="pl-name-row">
            <div class="pl-photo">
              <img src="${esc(emp.image||'')}" alt="${esc(emp.name)}"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
              <div class="pini" style="display:none">${ini(emp.name)}</div>
            </div>
            <div>
              <div class="pl-name">${esc(emp.name)}</div>
              <div class="pl-role">${esc(emp.role)}</div>
              <div class="pl-dept">${esc(emp.department)}</div>
            </div>
          </div>
          <!-- Meta -->
          <div class="pl-meta">
            <div class="pm-item">
              <div class="pm-lbl">Blood</div>
              <div class="pm-val blood">${esc(emp.blood_group||'—')}</div>
            </div>
            <div class="pm-item">
              <div class="pm-lbl">Since</div>
              <div class="pm-val since">${esc(emp.member_since||'—')}</div>
            </div>
            <div class="pm-item">
              <div class="pm-lbl">ID</div>
              <div class="pm-val">${esc(emp.id)}</div>
            </div>
          </div>
          <!-- Address -->
          <div class="pl-addr">${esc(emp.address)}</div>
        </div>

        <!-- RIGHT: QR -->
        <div class="phys-right">
          <div class="pr-qr" id="${cardId}"></div>
          <div class="pr-scan-txt">Scan to verify</div>
          <div class="pr-url">${esc(url)}</div>
        </div>
      </div>

      <!-- BOTTOM STRIP -->
      <div class="phys-bottom">
        <div class="pb-left">minibotix.online</div>
        <div class="pb-dot"></div>
        <div class="pb-right">© 2025</div>
      </div>
    </div>
    <button class="btn-print-one" onclick="window.print()">🖨 Print this card</button>
  </div>`;
}

(async function(){
  try{
    const r = await fetch('employees.json',{cache:'no-store'});
    if(!r.ok) throw new Error('employees.json not found');
    const list = await r.json();

    document.getElementById('screenInfo').textContent =
      `${list.length} employee${list.length!==1?'s':''} loaded · QR codes link to ${BASE_URL}MBX001 etc · Click "Print All Cards" to print`;

    document.getElementById('cardsWrap').innerHTML = list.map((e,i)=>buildCard(e,i)).join('');

    /* Generate QR codes after DOM settles */
    setTimeout(()=>{
      list.forEach(emp=>{
        const el = document.getElementById('qr-'+emp.id.replace(/[^a-zA-Z0-9]/g,''));
        if(!el) return;
        try{
          new QRCode(el,{
            text: empUrl(emp.id),
            width: 72, height: 72,
            colorDark: '#000000', colorLight: '#ffffff',
            correctLevel: QRCode.CorrectLevel.M
          });
        }catch(e){}
      });
    }, 200);

  }catch(e){
    document.getElementById('cardsWrap').innerHTML =
      `<div style="padding:60px;text-align:center;color:#3a5a72">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div style="font-size:14px">${esc(e.message)}</div>
      </div>`;
    document.getElementById('screenInfo').textContent = 'Error: '+e.message;
  }
})();
</script>
</body>
</html>
