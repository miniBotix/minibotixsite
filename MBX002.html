<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MiniBotix · Employee Profile</title>
<link rel="icon" href="logo.svg" type="image/svg+xml">
<meta property="og:title" content="MiniBotix Employee Profile">
<meta property="og:description" content="Official MiniBotix Employee ID">
<meta property="og:image" content="emp/MBX-002.jpg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   MiniBotix Employee Profile Page
   URL: minibotix.online/MBX001
   ══════════════════════════════════════════ */
:root{
  --bg:#03080f;--bg1:#060d1a;--bg2:#091525;--bg3:#0d1e35;
  --line:rgba(0,160,255,0.07);--line-hi:rgba(0,180,255,0.18);
  --c:#00aaff;--c2:#003fa0;--cg:#00ffa3;--co:#ff8c42;--cr:#ff3a5c;--cp:#b06fff;
  --gold:#c9a84c;--gold2:#e8c96a;
  --txt:#d8eeff;--txt2:#5a80a0;--txt3:#2a4a62;
  --glow:0 0 80px rgba(0,130,255,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);color:var(--txt);
  min-height:100vh;overflow-x:hidden;line-height:1.6;
}
::selection{background:rgba(0,180,255,0.2)}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--line-hi)}

/* ── BG ── */
#rain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.6}
.gbg{position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(var(--line)1px,transparent 1px),
    linear-gradient(90deg,var(--line)1px,transparent 1px);
  background-size:52px 52px;
  mask-image:radial-gradient(ellipse 100% 100% at 50% 0%,black 40%,transparent 100%)}
.blob{position:fixed;z-index:1;pointer-events:none;border-radius:50%;filter:blur(80px)}
.blob1{width:600px;height:600px;top:-200px;left:-150px;
  background:radial-gradient(circle,rgba(0,80,200,0.12),transparent 70%)}
.blob2{width:500px;height:500px;bottom:-100px;right:-100px;
  background:radial-gradient(circle,rgba(0,100,180,0.08),transparent 70%)}

/* ── LAYOUT ── */
.page{position:relative;z-index:10;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 60px}

/* ── TOP BAR ── */
.topbar{width:100%;max-width:520px;display:flex;align-items:center;
  justify-content:space-between;margin-bottom:32px}
.tb-brand{display:flex;align-items:center;gap:8px;cursor:pointer}
.tb-logo{width:30px;height:30px;border-radius:7px;overflow:hidden;
  background:linear-gradient(135deg,var(--c2),var(--c));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 3px 12px rgba(0,100,255,0.35)}
.tb-logo img{width:100%;height:100%;object-fit:cover;border-radius:7px}
.tb-logo .fb{font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:#fff}
.tb-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;letter-spacing:-.01em}
.tb-name em{color:var(--c);font-style:normal}
.tb-tag{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--cg);
  border:1px solid rgba(0,255,163,0.2);padding:4px 9px;border-radius:4px;
  display:flex;align-items:center;gap:5px}
.tb-tag::before{content:'';width:5px;height:5px;border-radius:50%;
  background:var(--cg);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 5px var(--cg)}50%{opacity:.3;box-shadow:none}}

/* ── MAIN CARD ── */
.id-card{
  width:100%;max-width:520px;
  background:var(--bg1);
  border:1px solid var(--line-hi);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--glow),0 50px 120px rgba(0,0,0,.85);
  animation:riseUp .65s cubic-bezier(.22,1,.36,1) both;
}
@keyframes riseUp{
  from{opacity:0;transform:translateY(40px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ── CARD HERO BAND ── */
.card-band{
  height:130px;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#001a50 0%,#0040aa 45%,#0099ee 100%);
}
.band-dots{position:absolute;inset:0;
  background-image:radial-gradient(circle,rgba(255,255,255,0.06) 1px,transparent 1px);
  background-size:18px 18px}
.band-lines{position:absolute;inset:0;overflow:hidden}
.band-lines::before,.band-lines::after{content:'';position:absolute;
  height:1px;background:rgba(255,255,255,0.08);width:200%}
.band-lines::before{top:40%;transform:rotate(-8deg) translateX(-30%)}
.band-lines::after{top:65%;transform:rotate(-8deg) translateX(-10%)}
.band-org{position:absolute;top:18px;left:22px}
.band-org-name{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;
  color:#fff;letter-spacing:-.01em;line-height:1}
.band-org-sub{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.2em;
  text-transform:uppercase;color:rgba(255,255,255,0.55);margin-top:4px}
.band-id{position:absolute;top:16px;right:20px;
  font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;
  background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.9);padding:5px 12px;border-radius:6px}
.band-wave{position:absolute;bottom:-1px;left:0;right:0;height:32px}
.band-wave svg{width:100%;height:100%}

/* ── PHOTO FLOAT ── */
.photo-float{
  position:relative;
  display:flex;justify-content:center;
  margin-top:-48px;margin-bottom:0;z-index:2;
}
.photo-ring{
  width:96px;height:96px;border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,var(--c2),var(--c),var(--cg));
  box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 6px rgba(0,180,255,0.08);
}
.photo-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;
  background:var(--bg2);border:3px solid var(--bg1)}
.photo-inner img{width:100%;height:100%;object-fit:cover;display:block}
.photo-inner .ini-txt{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:var(--c);
  background:var(--bg2)}
.online-ring{
  position:absolute;bottom:6px;right:calc(50% - 48px + 4px);
  width:16px;height:16px;border-radius:50%;
  background:var(--cg);border:3px solid var(--bg1);
  box-shadow:0 0 10px var(--cg)
}

/* ── NAME BLOCK ── */
.name-block{text-align:center;padding:14px 24px 0}
.emp-name{font-family:'Syne',sans-serif;font-weight:800;
  font-size:26px;letter-spacing:-.02em;line-height:1.1;margin-bottom:4px}
.emp-role{font-size:13px;font-weight:600;color:var(--c);letter-spacing:.02em}
.emp-dept{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--txt2);margin-top:5px}

/* ── DIVIDER ── */
.hdiv{height:1px;margin:20px 24px;
  background:linear-gradient(90deg,transparent,var(--line-hi),transparent)}

/* ── 4-CELL INFO GRID ── */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--line);margin:0 20px;border-radius:14px;overflow:hidden}
.ig-cell{background:var(--bg2);padding:14px 16px}
.ig-label{font-family:'DM Mono',monospace;font-size:7.5px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:5px}
.ig-val{font-size:13px;font-weight:600;color:var(--txt);line-height:1.2}
.ig-val.mono{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.04em}
.ig-val.blood{color:var(--cr);font-weight:800;font-size:18px}
.ig-val.green{color:var(--cg);display:flex;align-items:center;gap:5px}
.ig-val.green::before{content:'';width:6px;height:6px;border-radius:50%;
  background:var(--cg);animation:pulse 2s infinite;flex-shrink:0}

/* ── SKILLS ── */
.section{padding:16px 24px 0}
.sec-label{font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--txt3);margin-bottom:10px}
.skills-row{display:flex;gap:6px;flex-wrap:wrap}
.skill{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;padding:4px 10px;border-radius:5px;
  border:1px solid var(--line-hi);color:var(--c);
  background:rgba(0,170,255,0.05);transition:background .2s}
.skill:hover{background:rgba(0,170,255,0.12)}

/* ── ADDRESS ── */
.addr-row{display:flex;gap:10px;align-items:flex-start;padding:14px 24px 0}
.addr-icon{width:28px;height:28px;border-radius:7px;background:rgba(0,170,255,0.08);
  border:1px solid var(--line-hi);display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px}
.addr-text{font-size:12px;color:var(--txt2);line-height:1.65}

/* ── CONTACT PILLS ── */
.contact-row{display:flex;gap:8px;padding:14px 24px 0;flex-wrap:wrap}
.cpill{display:flex;align-items:center;gap:7px;padding:9px 14px;border-radius:10px;
  border:1px solid var(--line-hi);font-size:12px;color:var(--txt2);
  background:var(--bg2);transition:all .2s;cursor:pointer;text-decoration:none;flex:1;min-width:140px}
.cpill:hover{border-color:var(--c);color:var(--c);background:rgba(0,170,255,0.05)}
.cpill svg{flex-shrink:0;opacity:.6}
.cpill:hover svg{opacity:1}
.cpill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px}

/* ── VERIFICATION FOOTER ── */
.verify-bar{
  margin:20px 20px 0;
  padding:16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(0,60,160,0.2),rgba(0,180,255,0.07));
  border:1px solid rgba(0,180,255,0.14);
  display:flex;align-items:center;gap:12px}
.vb-icon{width:36px;height:36px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c2),var(--c));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,100,255,0.3)}
.vb-text h4{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;margin-bottom:2px}
.vb-text p{font-size:10px;color:var(--txt2);line-height:1.4}
.vb-badge{margin-left:auto;flex-shrink:0;
  font-family:'DM Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  padding:5px 10px;border-radius:5px;
  border:1px solid rgba(0,255,163,0.25);color:var(--cg);background:rgba(0,255,163,0.05)}

/* ── CARD FOOTER ── */
.card-foot{padding:16px 24px 22px;display:flex;align-items:center;justify-content:space-between;
  border-top:1px solid var(--line);margin-top:20px;gap:16px;flex-wrap:wrap}
.cf-left{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt3);line-height:1.7}
.cf-right{display:flex;align-items:center;gap:8px}
.cf-year{font-family:'DM Mono',monospace;font-size:9px;color:var(--txt3)}
.cf-seal{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--line-hi);
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);font-size:16px}

/* ── LOADING / ERROR ── */
.state-box{
  width:100%;max-width:520px;padding:60px 32px;text-align:center;
  background:var(--bg1);border:1px solid var(--line);border-radius:24px;
  animation:riseUp .5s ease both}
.spin{display:inline-block;width:36px;height:36px;border:2px solid var(--line);
  border-top-color:var(--c);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.state-box h2{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;margin-bottom:8px}
.state-box p{font-size:13px;color:var(--txt2);line-height:1.6}

/* PRINT */
@media print{
  #rain,.gbg,.blob1,.blob2,.topbar,.card-foot .cf-right{display:none!important}
  body{background:#fff;padding:0}
  .id-card{box-shadow:none;border-radius:0;border:none}
  .card-band{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ig-cell,.addr-text,.skill,.cpill{color:#000;border-color:#ddd;background:#f8f8f8}
  .ig-label,.sec-label,.cf-left{color:#666}
  .emp-name,.ig-val{color:#000}
}

@media(max-width:420px){
  .band-org-name{font-size:17px}.emp-name{font-size:22px}
  .contact-row{flex-direction:column}
  .cpill{min-width:unset;width:100%}
}
</style>
</head>
<body>
<canvas id="rain"></canvas>
<div class="gbg"></div>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="page">
  <!-- TOP BAR -->
  <div class="topbar">
    <div class="tb-brand" onclick="location.href='/'">
      <div class="tb-logo">
        <img src="logo.svg" alt="M" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
        <span class="fb" style="display:none">M</span>
      </div>
      <div class="tb-name">Mini<em>Botix</em></div>
    </div>
    <div class="tb-tag">Verified Employee</div>
  </div>

  <!-- CARD (filled by JS) -->
  <div id="root">
    <div class="state-box">
      <div class="spin"></div>
      <p>Loading profile…</p>
    </div>
  </div>
</div>

<script>
/* ── WHICH EMPLOYEE ──────────────────────────────
   Change this ONE value for each page:
   MBX001.html → 'MBX-001'
   MBX002.html → 'MBX-002'   etc.
   ──────────────────────────────────────────── */
const EMPLOYEE_ID = 'MBX-002';

/* ── RAIN ── */
(function(){
  const cv=document.getElementById('rain'),ctx=cv.getContext('2d');
  let W,H,dr=[];
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;init()}
  function init(){dr=[];for(let i=0;i<100;i++)dr.push({x:Math.random()*W,y:Math.random()*H-H,
    len:Math.random()*28+8,sp:Math.random()*2.5+1.2,sw:Math.random()*.8+.2,
    a:.03+Math.random()*.06,drift:Math.random()*.3-.15,ph:Math.random()*Math.PI*2})}
  function draw(){
    ctx.clearRect(0,0,W,H);
    dr.forEach(d=>{
      const g=ctx.createLinearGradient(d.x,d.y,d.x,d.y+d.len);
      g.addColorStop(0,'rgba(0,170,255,0)');
      g.addColorStop(.5,`rgba(0,180,255,${d.a})`);
      g.addColorStop(1,'rgba(0,170,255,0)');
      ctx.beginPath();ctx.strokeStyle=g;ctx.lineWidth=d.sw;
      ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+d.drift*3,d.y+d.len);ctx.stroke();
      d.y+=d.sp;if(d.y>H+30){d.y=-30;d.x=Math.random()*W}
    });
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize',rs);rs();draw();
})();

/* ── HELPERS ── */
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const ini = n => (n||'?').split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase();
const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function now(){const d=new Date();return`${days[d.getDay()]} ${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`}

/* ── RENDER ── */
function render(emp){
  document.title = `${emp.name} · MiniBotix`;
  /* update OG image if possible */
  document.querySelector('meta[property="og:title"]').content = `${emp.name} · MiniBotix`;
  document.querySelector('meta[property="og:description"]').content = `${emp.role} — ${emp.department}`;

  const skills = (emp.skills||[]).map(s=>`<span class="skill">${esc(s)}</span>`).join('');

  $('root').innerHTML = `
  <div class="id-card">

    <!-- GRADIENT BAND -->
    <div class="card-band">
      <div class="band-dots"></div>
      <div class="band-lines"></div>
      <div class="band-org">
        <div class="band-org-name">MiniBotix</div>
        <div class="band-org-sub">Official Employee Identity</div>
      </div>
      <div class="band-id">${esc(emp.id)}</div>
      <!-- Wave cut -->
      <div class="band-wave">
        <svg viewBox="0 0 520 32" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M0,32 L0,12 Q130,32 260,14 Q390,0 520,16 L520,32 Z" fill="#060d1a"/>
        </svg>
      </div>
    </div>

    <!-- FLOATING PHOTO -->
    <div class="photo-float">
      <div class="photo-ring">
        <div class="photo-inner">
          <img src="${esc(emp.image||'')}" alt="${esc(emp.name)}"
            onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="ini-txt" style="display:none">${ini(emp.name)}</div>
        </div>
      </div>
      ${emp.status==='active'?'<div class="online-ring"></div>':''}
    </div>

    <!-- NAME -->
    <div class="name-block">
      <div class="emp-name">${esc(emp.name)}</div>
      <div class="emp-role">${esc(emp.role)}</div>
      <div class="emp-dept">${esc(emp.department)}</div>
    </div>

    <div class="hdiv"></div>

    <!-- INFO GRID -->
    <div class="info-grid">
      <div class="ig-cell">
        <div class="ig-label">Employee ID</div>
        <div class="ig-val mono">${esc(emp.id)}</div>
      </div>
      <div class="ig-cell">
        <div class="ig-label">Blood Group</div>
        <div class="ig-val blood">${esc(emp.blood_group||'—')}</div>
      </div>
      <div class="ig-cell">
        <div class="ig-label">Member Since</div>
        <div class="ig-val mono">${esc(emp.member_since||'—')}</div>
      </div>
      <div class="ig-cell">
        <div class="ig-label">Status</div>
        <div class="ig-val green">${emp.status==='active'?'Active':'Inactive'}</div>
      </div>
    </div>

    <!-- SKILLS -->
    ${skills?`
    <div class="section">
      <div class="sec-label">Skills</div>
      <div class="skills-row">${skills}</div>
    </div>`:''}

    <!-- ADDRESS -->
    <div class="addr-row">
      <div class="addr-icon">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="var(--c)">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
      </div>
      <div class="addr-text">${esc(emp.address)}</div>
    </div>

    <!-- CONTACT -->
    <div class="contact-row">
      ${emp.phone?`<a class="cpill" href="tel:${esc(emp.phone)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
        </svg>
        <span>${esc(emp.phone)}</span>
      </a>`:''}
      ${emp.email?`<a class="cpill" href="mailto:${esc(emp.email)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
          <path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
        <span>${esc(emp.email)}</span>
      </a>`:''}
    </div>

    <!-- VERIFICATION BAR -->
    <div class="verify-bar">
      <div class="vb-icon">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#fff">
          <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>
        </svg>
      </div>
      <div class="vb-text">
        <h4>Verified MiniBotix Employee</h4>
        <p>This page is official. Verified on ${now()}.</p>
      </div>
      <div class="vb-badge">✓ Official</div>
    </div>

    <!-- CARD FOOTER -->
    <div class="card-foot">
      <div class="cf-left">
        minibotix.online<br>
        © 2025 MiniBotix
      </div>
      <div class="cf-right">
        <div class="cf-year">Since ${esc(emp.member_since||'2025')}</div>
        <div class="cf-seal">🤖</div>
      </div>
    </div>

  </div>`;
}

function showError(msg){
  $('root').innerHTML=`
  <div class="state-box">
    <div style="font-size:38px;margin-bottom:14px">⚠️</div>
    <h2>Profile Not Found</h2>
    <p>${esc(msg)}</p>
  </div>`;
}

/* ── LOAD employees.json ── */
(async function(){
  try{
    /* Try path relative to site root for minibotix.online/MBX001 setup */
    const paths = ['employees.json', '/employees.json'];
    let data = null;
    for(const p of paths){
      try{
        const r = await fetch(p,{cache:'no-store'});
        if(r.ok){data = await r.json();break}
      }catch(e){}
    }
    if(!data) throw new Error('employees.json not found');

    const emp = data.find(e=>(e.id||'').replace('-','').toUpperCase() ===
                              EMPLOYEE_ID.replace('-','').toUpperCase());
    if(!emp) throw new Error(`No employee with ID ${EMPLOYEE_ID}`);
    render(emp);
  }catch(e){
    showError(e.message);
  }
})();
</script>
